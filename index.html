<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水電面板訂購工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');
  :root {
    --bg:#f5f3ef;--bg2:#eeebe5;--bg3:#e5e1d8;--surface:#faf9f6;
    --border:#d8d2c8;--border2:#c8c0b4;--text:#2c2820;--text2:#6b6258;
    --text3:#9e9488;--accent2:#5c5248;--gold:#b8a882;--gold2:#9e8f6a;
    --red:#8c4a3c;--shadow:0 1px 4px rgba(44,40,32,.08);--shadow2:0 4px 20px rgba(44,40,32,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.7;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Noto Sans TC',sans-serif;font-size:20px;font-weight:300;letter-spacing:.1em;color:var(--text);}
  .logo span{color:var(--gold2);}
  .header-actions{display:flex;gap:10px;}
  .btn{font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:400;padding:9px 20px;border-radius:2px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;letter-spacing:.06em;transition:all .2s;}
  .btn:hover{background:var(--bg3);color:var(--text);}
  .btn.primary{background:var(--accent2);border-color:var(--accent2);color:#f5f3ef;}
  .btn.primary:hover{background:var(--text);border-color:var(--text);}
  .btn.danger{color:var(--red);border-color:#d4b4ae;}
  .btn.danger:hover{background:#f5e8e6;}
  .btn.sm{padding:6px 14px;font-size:12px;}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:var(--surface);}
  .btn.gold:hover{background:var(--gold2);border-color:var(--gold2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  main{max-width:1060px;margin:0 auto;padding:32px 24px;}
  section{margin-bottom:28px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:24px;box-shadow:var(--shadow);}
  .card-title{font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  label{display:block;font-size:12px;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;}
  input[type="text"],select{width:100%;font-family:'Noto Sans TC',sans-serif;font-size:15px;padding:10px 13px;border:1px solid var(--border);border-radius:2px;background:var(--bg);color:var(--text);transition:border-color .2s;outline:none;}
  input[type="text"]:focus,select:focus{border-color:var(--gold2);}
  input.input-error{border:2px solid var(--red)!important;}
  input.input-error:focus{border-color:var(--red)!important;}
  input:disabled,select:disabled{opacity:.5;background:var(--bg3);}
  .add-form{display:grid;grid-template-columns:1fr 1fr 1.8fr 0.8fr 0.6fr auto;gap:10px;align-items:end;}
  .add-form>div{display:flex;flex-direction:column;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead th{text-align:left;font-size:12px;font-weight:400;letter-spacing:.08em;color:var(--text3);padding:10px 13px;border-bottom:1px solid var(--border);white-space:nowrap;}
  thead th:first-child{min-width:72px;}
  tbody tr{border-bottom:1px solid var(--bg3);transition:background .15s;position:relative;}
  tbody tr:hover{background:var(--bg2);}
  tbody td{padding:12px 13px;vertical-align:top;}
  tbody td:first-child{min-width:72px;white-space:nowrap;}
  td.parts{font-size:12px;color:var(--text2);line-height:1.9;}
  td.parts span{display:block;background:var(--bg3);border:1px solid var(--border);padding:2px 10px;border-radius:20px;margin:2px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);}
  td.parts span.custom-tag{background:#f0ede7;border-color:var(--gold);color:var(--gold2);}
  td.parts span.invalid-tag{background:#f5e8e6;border-color:#d4b4ae;color:var(--red);}
  .qty-badge{display:inline-block;background:var(--accent2);color:var(--surface);font-family:'DM Mono',monospace;font-size:13px;padding:3px 11px;border-radius:20px;}
  table.one-color .col-part-color,table.one-color .col-dir{display:none;}
  .card-action{background:var(--bg2);border-color:var(--border2);}
  .row-actions{display:flex;flex-direction:column;gap:4px;opacity:0;pointer-events:none;transition:opacity .15s;}
  tbody tr:hover .row-actions{opacity:1;pointer-events:auto;}
  td.td-actions{width:36px;padding:8px 6px;vertical-align:top;}
  .btn-icon{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:3px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-size:14px;line-height:1;transition:all .15s;padding:0;font-family:sans-serif;}
  .btn-icon:hover{background:var(--bg3);color:var(--text);}
  .btn-icon.danger{color:var(--red);border-color:#d4b4ae;}
  .btn-icon.danger:hover{background:#f5e8e6;}
  .type-series{font-size:11px;letter-spacing:.08em;color:var(--text3);margin-bottom:2px;}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .summary-item{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;font-size:14px;}
  .summary-item .part-name{color:var(--text2);flex:1;font-size:13px;display:flex;flex-direction:column;gap:2px;}
  .summary-item .group-label{font-size:11px;letter-spacing:.06em;color:var(--text3);}
  .summary-item .part-qty{font-family:'DM Mono',monospace;font-size:17px;color:var(--text);margin-left:12px;}
  .summary-item .part-unit{font-size:10px;color:var(--text3);margin-left:3px;}
  .empty{text-align:center;padding:40px;color:var(--text3);font-size:14px;letter-spacing:.06em;}
  .series-tag{display:inline-block;font-size:12px;letter-spacing:.1em;padding:3px 10px;border-radius:2px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
  footer{margin-top:48px;padding:20px 24px;text-align:center;font-size:12px;color:var(--text3);letter-spacing:.08em;border-top:1px solid var(--border);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,40,32,.45);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:28px;max-width:520px;width:92%;box-shadow:var(--shadow2);max-height:90vh;overflow-y:auto;}
  .modal h3{font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:500;margin-bottom:16px;color:var(--text);}
  .modal p{color:var(--text2);font-size:13px;margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:4px;}
  .edit-grid .full{grid-column:1/-1;}
  .notif{position:fixed;bottom:24px;right:24px;background:var(--accent2);color:var(--surface);padding:10px 20px;border-radius:3px;font-size:12px;letter-spacing:.06em;opacity:0;transform:translateY(8px);transition:all .3s;z-index:300;}
  .notif.show{opacity:1;transform:translateY(0);}
  /* custom parts builder */
  .custom-parts-list{margin-bottom:12px;}
  .custom-part-row{display:grid;grid-template-columns:1fr 80px auto;gap:8px;align-items:center;margin-bottom:8px;}
  .custom-part-row input{font-family:'DM Mono',monospace;font-size:12px;}
  .color-dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--border2);display:inline-block;flex-shrink:0;}
  @media(max-width:700px){.add-form{grid-template-columns:1fr 1fr}.info-grid{grid-template-columns:1fr}header{padding:16px}.logo{font-size:16px}}
</style>
</head>
<body>
<header>
  <div class="logo">面板訂購工具</div>
  <div class="header-actions">
    <button class="btn" onclick="importData()">匯入</button>
    <button class="btn" onclick="exportJSON()">儲存 JSON</button>
    <button class="btn gold" onclick="exportPDF()">匯出 PDF</button>
    <button class="btn" onclick="exportJPG()">匯出 JPG</button>
  </div>
</header>

<main>
  <!-- 專案資訊 -->
  <section>
    <div class="card">
      <div class="card-title">專案資訊</div>
      <div class="info-grid">
        <div>
          <label>案名</label>
          <input type="text" id="projectName" placeholder="建案名稱 戶號" oninput="this.classList.remove('input-error')">
        </div>
        <div>
          <label>面板系列</label>
          <select id="panelSeries" onchange="onSeriesChange()">
            <option value="Glatima">Glatima（國際牌）</option>
            <option value="Risna">Risna（國際牌）</option>
            <option value="So-style">So-style（國際牌）</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <!-- 新增項目 -->
  <section>
    <div class="card card-action">
      <div class="card-title">新增項目</div>
      <div class="add-form">
        <div>
          <label>空間</label>
          <input type="text" id="addSpace" placeholder="例：玄關" list="spaceList">
          <datalist id="spaceList">
            <option value="玄關"><option value="客廳"><option value="餐廳"><option value="廚房">
            <option value="主臥"><option value="次臥"><option value="兒童房"><option value="主衛">
            <option value="客衛"><option value="走廊"><option value="書房"><option value="陽台">
          </datalist>
        </div>
        <div>
          <label>蓋板顏色</label>
          <select id="addCoverColor"></select>
        </div>
        <div>
          <label>類型</label>
          <select id="addType" onchange="onTypeChange()"></select>
        </div>
        <div>
          <label>零件色</label>
          <select id="addPartColor"></select>
        </div>
        <div>
          <label>數量</label>
          <input type="text" id="addQty" placeholder="1">
        </div>
        <div>
          <button class="btn primary" onclick="addItem()" style="white-space:nowrap">＋ 新增</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 項目列表 -->
  <section>
    <div class="card">
      <div class="card-title">項目列表</div>
      <div class="table-wrap">
        <table id="mainTable">
          <thead>
            <tr>
              <th>空間</th>
              <th>蓋板色</th>
              <th>類型</th>
              <th class="col-part-color">零件色</th>
              <th class="col-dir">方向</th>
              <th>數量</th>
              <th>拆分零件（含料號）</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="itemBody">
            <tr><td colspan="8" class="empty">尚無項目，請新增面板項目</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 品項統計 -->
  <section>
    <div class="card">
      <div class="card-title">品項統計</div>
      <div id="typeSummaryContent"><div class="empty">新增項目後將顯示統計</div></div>
    </div>
  </section>

  <!-- 零件統計 -->
  <section>
    <div class="card">
      <div class="card-title">零件統計匯總</div>
      <div id="summaryContent"><div class="empty">新增項目後將顯示統計</div></div>
    </div>
  </section>
</main>

<footer>面板訂購計算工具 ／ v1.1</footer>
<div class="notif" id="notif"></div>

<!-- 刪除 modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>確認刪除</h3>
    <p>確定要刪除此項目嗎？此動作無法還原。</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeDeleteModal()">取消</button>
      <button class="btn danger" onclick="confirmDelete()">刪除</button>
    </div>
  </div>
</div>

<!-- 編輯 modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>編輯項目</h3>
    <div class="edit-grid">
      <div class="full"><label>面板系列</label><select id="editSeries" onchange="onEditSeriesChange()">
        <option value="Glatima">Glatima（國際牌）</option>
        <option value="Risna">Risna（國際牌）</option>
        <option value="So-style">So-style（國際牌）</option>
      </select></div>
      <div><label>空間</label><input type="text" id="editSpace" list="spaceList"></div>
      <div><label>蓋板顏色</label><select id="editCoverColor"></select></div>
      <div class="full"><label>類型</label><select id="editType" onchange="onEditTypeChange()"></select></div>
      <div><label>零件色</label><select id="editPartColor"></select></div>
      <div><label>方向</label><select id="editDir"><option value="橫">橫式</option><option value="直">直式</option></select></div>
      <div><label>數量</label><input type="text" id="editQty"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeEditModal()">取消</button>
      <button class="btn primary" onclick="confirmEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- 自訂組合 modal -->
<div class="modal-overlay" id="customModal">
  <div class="modal">
    <h3 id="customModalTitle">自訂組合</h3>
    <div class="edit-grid" style="margin-bottom:12px;">
      <div class="full">
        <label>面板系列</label>
        <select id="customSeries">
          <option value="Glatima">Glatima（國際牌）</option>
          <option value="Risna">Risna（國際牌）</option>
          <option value="So-style">So-style（國際牌）</option>
        </select>
      </div>
      <div>
        <label>空間</label>
        <input type="text" id="customSpace" placeholder="例：玄關" list="spaceList">
      </div>
      <div>
        <label>說明（列表顯示）</label>
        <input type="text" id="customLabel" placeholder="例：客廳雙連混合面板">
      </div>
      <div>
        <label>蓋板色（選填）</label>
        <input type="text" id="customCoverColor" placeholder="例：玻璃/霧黑">
      </div>
      <div>
        <label>零件色（選填）</label>
        <input type="text" id="customPartColor" placeholder="例：陶瓷白">
      </div>
    </div>
    <div class="custom-parts-list" id="customPartsList"></div>
    <button class="btn sm" onclick="addCustomPartRow()" style="margin-bottom:16px;">＋ 新增零件</button>
    <div class="modal-actions">
      <button class="btn" onclick="closeCustomModal()">取消</button>
      <button class="btn primary" onclick="confirmCustom()">儲存</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">

<script>

// So-style 和 Risna：只有一個顏色維度，「零件色」欄位隱藏
function isOneColorSeries(series) {
  return series === 'So-style' || series === 'Risna';
}

function getPartColors(series, type) {
  if (isOneColorSeries(series)) return []; // 單維度，不需零件色
  if (series !== 'Glatima') return ['白','灰','黑'];
  if (type === '自訂組合') return [];
  if (type && type.includes('(緊急)')) return ['紅'];
  if (type && ['緊急押釦','電鈴'].includes(type)) return ['白','灰'];
  const switchTypes = ['單連1切開關','單連2切開關','單連3切開關','雙連4切開關','雙連5切開關','雙連6切開關'];
  if (switchTypes.includes(type)) return GL.partColors.switch;
  return ['白','灰','黑'];
}

function getPartsGlatima(type, coverColor, partColor, dir, qty) {
  const n = parseInt(qty) || 1;
  const parts = {};
  const add = (name, count) => { parts[name] = (parts[name] || 0) + count; };

  const isDouble = GL.isDouble.includes(type);
  const coverIdx = isDouble ? (dir === '橫' ? 2 : 3) : (dir === '橫' ? 0 : 1);
  const coverPn = GL.cover[coverColor]?.[coverIdx];
  const dirLabel = dir === '橫' ? '橫式' : '直式';
  const connLabel = isDouble ? '雙連' : '單連';
  const coverLabel = coverPn
    ? `${connLabel}${dirLabel}外蓋板 ${coverPn}`
    : `${connLabel}${dirLabel}外蓋板（無此料號）`;

  // ── 開關類 ──
  const switchMap = {'單連1切開關':1,'單連2切開關':2,'單連3切開關':3,'雙連4切開關':4,'雙連5切開關':5,'雙連6切開關':6};
  if (type in switchMap) {
    add(coverLabel, n);
    const cuts = switchMap[type];
    if (cuts === 1) {
      const pn = GL.btn['單連1切開關']?.[partColor];
      add(`1切按鍵組 ${pn || '（無此色）'}`, n);
    } else if (cuts === 2) {
      const pn = GL.btn['單連2切開關']?.[partColor];
      add(`2切按鍵組 ${pn || '（無此色）'}`, n);
    } else if (cuts === 3) {
      const pn = GL.btn['單連3切開關']?.[partColor];
      add(`3切按鍵組 ${pn || '（無此色）'}`, n);
    } else if (cuts === 4) {
      const pn2 = GL.btn['單連2切開關']?.[partColor];
      add(`2切按鍵組 ${pn2 || '（無此色）'}`, n * 2);
    } else if (cuts === 5) {
      const pn2 = GL.btn['單連2切開關']?.[partColor];
      const pn3 = GL.btn['單連3切開關']?.[partColor];
      add(`2切按鍵組 ${pn2 || '（無此色）'}`, n);
      add(`3切按鍵組 ${pn3 || '（無此色）'}`, n);
    } else if (cuts === 6) {
      const pn3 = GL.btn['單連3切開關']?.[partColor];
      add(`3切按鍵組 ${pn3 || '（無此色）'}`, n * 2);
    }
    return parts;
  }

  // ── 混合類 ──
  if (type in GL.combo) {
    add(coverLabel, n);
    const pn = GL.combo[type]?.[partColor];
    const comboName = GL_COMBO_NAMES[type] || type;
    add(`${comboName} ${pn || '（無此色）'}`, n);
    return parts;
  }

  // ── 雙連盲蓋 ──
  if (type === '雙連盲蓋') {
    add(coverLabel, n);
    const pn = GL.part['雙連盲蓋']?.[partColor];
    add(`封口蓋板 ${pn || '（無此色）'}`, n * 2);
    return parts;
  }
  // ── 單連盲蓋 ──
  if (type === '單連盲蓋') {
    add(coverLabel, n);
    const pn = GL.part['單連盲蓋']?.[partColor];
    add(`封口蓋板 ${pn || '（無此色）'}`, n);
    return parts;
  }

  // ── 弱電類 ──
  if (type in GL.weakConfig) {
    add(coverLabel, n);
    const cfg = GL.weakConfig[type];
    const wn = GL_WEAK_NAMES[type];
    const partPn = GL.part[type]?.[partColor];
    // 複合弱電（料號用+分隔）拆開各自命名
    if (partPn && partPn.includes('+')) {
      const pns = partPn.split('+').map(s => s.trim());
      const names = (wn?.sock || type).split('+').map(s => s.trim());
      pns.forEach((pn, i) => add(`${names[i] || '弱電模組'} ${pn}`, n));
    } else if (partPn) {
      const sockQty = (type === '雙孔網路' || type === '雙孔電視') ? 2 : 1;
      add(`${wn?.sock || type} ${partPn}`, n * sockQty);
    } else {
      add(`${wn?.sock || type}（無此色）`, n);
    }
    const cosmeticPn = GL.cosmetic[cfg.holes]?.[partColor];
    if (cosmeticPn) add(`${wn?.cosmetic || '化妝蓋板'} ${cosmeticPn}`, n);
    if (cfg.frameColors.includes(partColor)) add(`絕緣框架 ${GL.frame}`, n);
    return parts;
  }

  // ── 插座類（含特殊） ──
  const partPn = GL.part[type]?.[partColor];
  if (partPn !== undefined) {
    add(coverLabel, n);
    const sockName = GL_SOCK_NAMES[type] || type;
    add(partPn ? `${sockName} ${partPn}` : `${sockName}（無此色）`, n);
    return parts;
  }

  // fallback
  add(coverLabel, n);
  add(`${type}`, n);
  return parts;
}

// 從 Risna 外蓋板料號推導名稱
function getRnCoverName(pn) {
  if (!pn) return '外蓋板';
  if (/6891/.test(pn)) return '單連盲蓋蓋板';
  if (/6892/.test(pn)) return '雙連盲蓋蓋板';
  if (/6101/.test(pn)) return '單連開關蓋板';
  if (/6102/.test(pn)) return '雙連開關蓋板';
  if (/6801/.test(pn)) return '1孔插座弱電用蓋板';
  if (/6802/.test(pn)) return '2孔插座弱電用蓋板';
  if (/6803/.test(pn)) return '3孔插座弱電用蓋板';
  return '外蓋板';
}

// 從 So-style 外蓋板料號推導名稱
function getSsCoverName(pn) {
  if (!pn) return '蓋板';
  if (/6191/.test(pn)) return '單連盲蓋蓋板';
  if (/6192/.test(pn)) return '雙連盲蓋蓋板';
  const m = pn.match(/610([1-6])/);
  if (m) {
    const n = parseInt(m[1]);
    return `${n <= 3 ? '單連' : '雙連'}${n}孔蓋板`;
  }
  return '蓋板';
}

function getPartsSoStyle(type, color, qty) {
  const n = parseInt(qty) || 1;
  const parts = {};
  const add = (name, count) => { parts[name] = (parts[name] || 0) + count; };
  const d = SS.data[type]?.[color];
  if (!d) { add(`（查無料號：${type}/${color}）`, n); return parts; }

  add(`${getSsCoverName(d.cover)} ${d.cover}`, n);

  // 輔助：依名稱對照 + sock PN 列組合（處理 + 分隔的複合弱電）
  function addSockParts(sockPnStr, nameStr, baseQty) {
    const pns = sockPnStr.split('+').map(s => s.trim());
    if (pns.length === 1) {
      add(`${nameStr} ${pns[0]}`, baseQty);
    } else {
      const names = nameStr.split('+').map(s => s.trim());
      pns.forEach((s, i) => add(`${names[i] || '插座'} ${s}`, baseQty));
    }
  }

  // 開關類
  const cuts = SS.btnCuts[type];
  if (cuts !== undefined && d.btn) {
    const frameQty = cuts <= 3 ? 1 : 2;
    add(`${cuts}切按鍵組 [按鍵 ${d.btn}×${cuts} + 絕緣框架 ${d.frame}×${frameQty}]`, n);
    return parts;
  }
  // 混合類（含按鍵+插座）
  const comboCuts = SS.comboCuts[type];
  if (comboCuts !== undefined) {
    add(`${comboCuts}切按鍵組 [按鍵 ${d.btn}×${comboCuts} + 絕緣框架 ${d.frame}×1]`, n);
    if (d.sock) {
      addSockParts(d.sock, SS_SOCK_NAMES[type] || type, n);
    }
    return parts;
  }
  // 插座類（無 frame）
  if (d.sock && !d.frame) {
    const sockQty = d.sockQty || 1;
    addSockParts(d.sock, SS_SOCK_NAMES[type] || type, n * sockQty);
    return parts;
  }
  // 弱電類（有 frame）
  if (d.sock && d.frame) {
    const sockQty = d.sockQty || 1;
    addSockParts(d.sock, SS_SOCK_NAMES[type] || type, n * sockQty);
    add(`絕緣框架 ${d.frame}`, n);
    return parts;
  }
  // 盲蓋（只有外蓋板）
  return parts;
}

// ═══════════════════════════════════════════════════════════
// RISNA getParts（顏色單維度，無橫直）
// ═══════════════════════════════════════════════════════════
function getPartsRisna(type, color, qty) {
  const n = parseInt(qty) || 1;
  const parts = {};
  const add = (name, count) => { parts[name] = (parts[name] || 0) + count; };
  const d = RN.data[type]?.[color];
  if (!d) { add(`（查無料號：${type}/${color}）`, n); return parts; }

  add(`${getRnCoverName(d.cover)} ${d.cover}`, n);

  // 輔助：依名稱對照 + sock PN 列組合（處理 + 分隔的複合弱電）
  function addSockParts(sockPnStr, nameStr, baseQty) {
    const pns = sockPnStr.split('+').map(s => s.trim());
    if (pns.length === 1) {
      add(`${nameStr} ${pns[0]}`, baseQty);
    } else {
      const names = nameStr.split('+').map(s => s.trim());
      pns.forEach((s, i) => add(`${names[i] || '插座'} ${s}`, baseQty));
    }
  }

  // 開關（1/2/3切）
  const cutMap = {'單連1切開關':1,'單連2切開關':2,'單連3切開關':3};
  if (d.btn && !d.combo && !d.sock && cutMap[type] !== undefined) {
    const cuts = cutMap[type];
    add(`${cuts}切按鍵 ${d.btn}`, n);
    return parts;
  }
  // 緊急押釦 / 電鈴
  if (d.btn && !d.combo && !d.sock) {
    const btnName = RN_SOCK_NAMES[type] || '按鍵';
    add(`${btnName} ${d.btn}`, n);
    return parts;
  }
  // 4切 = 2切×2
  if (d.btn2 && d.cnt === 2 && !d.btn3) {
    add(`2切按鍵 ${d.btn2}`, n * 2);
    return parts;
  }
  // 5切 = 2切×1 + 3切×1
  if (d.btn2 && d.btn3 && !d.cnt) {
    add(`2切按鍵 ${d.btn2}`, n);
    add(`3切按鍵 ${d.btn3}`, n);
    return parts;
  }
  // 6切 = 3切×2
  if (d.btn3 && d.cnt === 2) {
    add(`3切按鍵 ${d.btn3}`, n * 2);
    return parts;
  }
  // 混合類（combo 料號為完整組合模組）
  if (d.combo) {
    add(`組合模組 ${d.combo}`, n);
    return parts;
  }
  // 插座類（無 frame）
  if (d.sock && !d.frame) {
    addSockParts(d.sock, RN_SOCK_NAMES[type] || type, n);
    return parts;
  }
  // 弱電類（有 frame）
  if (d.sock && d.frame) {
    const sockQty = d.sockQty || 1;
    addSockParts(d.sock, RN_SOCK_NAMES[type] || type, n * sockQty);
    add(`絕緣框架 ${d.frame}`, n);
    return parts;
  }
  // 盲蓋（只有外蓋板）
  return parts;
}

// ═══════════════════════════════════════════════════════════
// MAIN getParts dispatcher
// ═══════════════════════════════════════════════════════════
function getParts(item) {
  if (item.custom) return item.customParts || {};
  const {type, coverColor, partColor, dir, qty, series} = item;
  if (series === 'Glatima')   return getPartsGlatima(type, coverColor, partColor, dir, qty);
  if (series === 'So-style')  return getPartsSoStyle(type, coverColor, qty);   // coverColor = 顏色（單維度）
  if (series === 'Risna')     return getPartsRisna(type, coverColor, qty);     // coverColor = 顏色（單維度）
  return {};
}

// ── UI STATE ──────────────────────────────────────────────────
let items = [];
let deleteTargetIdx = null;
let editTargetIdx = null;

function getSeries() { return document.getElementById('panelSeries').value; }

function onSeriesChange() {
  rebuildTypeSelect('addType');
  rebuildCoverColorSelect('addCoverColor');

  const oneColor = isOneColorSeries(getSeries());

  });

  document.getElementById('mainTable')?.classList.toggle('one-color', oneColor);

  renderItems();

function rebuildTypeSelect(id, seriesOverride) {
  const sel = document.getElementById(id);
  const series = seriesOverride || getSeries();
  const groups = TYPE_GROUPS[series] || TYPE_GROUPS['So-style'];
  sel.innerHTML = groups.map(g =>
    `<optgroup label="${g.group}">${g.types.map(t => `<option value="${t}">${t}</option>`).join('')}</optgroup>`
  ).join('');
}

function rebuildCoverColorSelect(id, seriesOverride) {
  const sel = document.getElementById(id);
  const series = seriesOverride || getSeries();
  const colors = COVER_COLORS[series] || ['白','灰','黑'];
  sel.innerHTML = colors.map(c => `<option value="${c}">${c}</option>`).join('');
}

function rebuildPartColorSelect(id, type, seriesOverride) {
  const sel = document.getElementById(id);
  const series = seriesOverride || getSeries();
  const colors = getPartColors(series, type);
  sel.innerHTML = colors.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.disabled = (colors.length === 0);
}

function onTypeChange() {

    openCustomModal();

}
function onEditTypeChange() {
  const series = document.getElementById('editSeries').value;
  const type = document.getElementById('editType').value;
  rebuildPartColorSelect('editPartColor', type, series);
}

function onEditSeriesChange() {
  const series = document.getElementById('editSeries').value;
  rebuildCoverColorSelect('editCoverColor', series);
  rebuildTypeSelect('editType', series);
  onEditTypeChange();
  toggleEditOneColor(series);

function toggleEditOneColor(series) {
  const oneColor = isOneColorSeries(series);
  ['editPartColor','editDir'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.closest('div').style.display = oneColor ? 'none' : '';

// ── RENDER ────────────────────────────────────────────────────
function renderItems() {
  const tbody = document.getElementById('itemBody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">尚無項目，請新增面板項目</td></tr>';
  } else {
    tbody.innerHTML = items.map((it, i) => {
      const itemSeries = it.series || getSeries();
      const parts = getParts({...it, series: itemSeries});
      const partsHtml = Object.entries(parts).map(([k,v]) => {
        const isInvalid = /無此項目|無此料號|無此色|查無料號/.test(k);
        const cls = it.custom ? 'custom-tag' : (isInvalid ? 'invalid-tag' : '');
        return `<span${cls ? ` class="${cls}"` : ''}>${k} ×${v}</span>`;
      }).join('');
      const coverColorLabel = it.coverColor || '—';
      const partColorLabel  = it.partColor  || '—';
      const dirLabel = it.custom ? '—' : (it.dir || '橫');
      const oneColor = isOneColorSeries(itemSeries);
      return `<tr>
        <td>${it.space}</td>
        <td><span class="series-tag">${coverColorLabel}</span></td>
        <td>
          <div class="type-series">${itemSeries}</div>
          ${it.custom ? `<em style="color:var(--gold2)">${it.label||'自訂組合'}</em>` : it.type}
        </td>
        <td class="col-part-color">${oneColor ? '' : `<span class="series-tag">${partColorLabel}</span>`}</td>
        <td class="col-dir">${oneColor ? '' : dirLabel}</td>
        <td><span class="qty-badge">${it.qty}</span></td>
        <td class="parts">${partsHtml}</td>
        <td class="td-actions"><div class="row-actions">
          <button class="btn-icon" title="編輯" onclick="${it.custom ? `openCustomModal(${i})` : `openEditModal(${i})`}">✎</button>
          <button class="btn-icon danger" title="刪除" onclick="openDeleteModal(${i})">✕</button>
        </div></td>
      </tr>`;
    }).join('');
  }
  renderTypeSummary();
  renderSummary();
}

// 品項統計分組標題：
// So-style：單行「系列 顏色色」，不分蓋板/零件
// Glatima / Risna：兩行（第一行系列／第二行 方向+蓋板色+零件色）
function getItemAttrLabel(it) {
  const itemSeries = it.series || getSeries();
  if (itemSeries === 'So-style') {
    return it.coverColor ? `${itemSeries} ${it.coverColor}色` : itemSeries;
  }
  const oneColor = isOneColorSeries(itemSeries);
  const segs = [itemSeries];
  if (!it.custom && !oneColor && it.dir) segs.push(it.dir === '直' ? '直式' : '橫式');
  if (it.coverColor) segs.push(`${it.coverColor}蓋板`);
  if (it.partColor) segs.push(`${it.partColor}零件`);
  return segs.join('　');
}

// 判斷零件名稱是否為「蓋板」類
function isCoverPartName(name) {
  return /蓋板/.test(name);
}

// 零件統計用分組標籤（皆為單行）：
// Risna 蓋板色 → 零件色對應（銅邊/銀邊只影響蓋板外觀，零件統一用底色）
const RISNA_PART_COLOR_MAP = { '白/銅邊':'白', '白/銀邊':'白', '灰/銀邊':'灰' };

// So-style：蓋板與零件共用同一顏色，合併顯示「系列 顏色色」
// Risna：蓋板顯示「系列 顏色蓋板」、其他零件顯示「系列 零件色零件」（依對應表換算）
// Glatima：蓋板顯示「系列 方向 蓋板色蓋板」、其他零件顯示「系列 零件色零件」
function getPartsGroupLabel(it, itemSeries, isCover) {
  if (itemSeries === 'So-style') {
    return it.coverColor ? `${itemSeries} ${it.coverColor}色` : itemSeries;
  }
  if (itemSeries === 'Risna') {
    if (isCover) return it.coverColor ? `${itemSeries} ${it.coverColor}蓋板` : itemSeries;
    const partColor = RISNA_PART_COLOR_MAP[it.coverColor] || it.coverColor;
    return partColor ? `${itemSeries} ${partColor}零件` : itemSeries;
  }
  const segs = [itemSeries];
  if (isCover) {
    if (!it.custom && it.dir) segs.push(it.dir === '直' ? '直式' : '橫式');
    if (it.coverColor) segs.push(`${it.coverColor}蓋板`);
  } else {
    if (it.partColor) segs.push(`${it.partColor}零件`);
  }
  return segs.join(' ');
}

// 品項統計用：標籤分兩行呈現（第一行系列，第二行其餘屬性）
function renderGroupedSummary(groups) {
  const groupKeys = Object.keys(groups).sort((a,b) => a.localeCompare(b));
  const cards = [];
  groupKeys.forEach(label => {
    const segs = label.split('　');
    const seriesLine = segs[0] || '';
    const restLine = segs.slice(1).join(' ');
    Object.entries(groups[label]).sort((a,b) => a[0].localeCompare(b[0])).forEach(([k,v]) => {
      cards.push(`
        <div class="summary-item">
          <span class="part-name"><span class="group-label">${seriesLine}</span>${restLine ? `<span class="group-label">${restLine}</span>` : ''}${k}</span>
          <span class="part-qty">${v}<span class="part-unit">個</span></span>
        </div>`);
    });
  });
  return `<div class="summary-grid">${cards.join('')}</div>`;
}

// 零件統計用：標籤只顯示單行
function renderFlatSummary(groups) {
  const groupKeys = Object.keys(groups).sort((a,b) => a.localeCompare(b));
  const cards = [];
  groupKeys.forEach(label => {
    Object.entries(groups[label]).sort((a,b) => a[0].localeCompare(b[0])).forEach(([k,v]) => {
      cards.push(`
        <div class="summary-item">
          <span class="part-name"><span class="group-label">${label}</span>${k}</span>
          <span class="part-qty">${v}<span class="part-unit">個</span></span>
        </div>`);
    });
  });
  return `<div class="summary-grid">${cards.join('')}</div>`;
}

function renderTypeSummary() {
  const el = document.getElementById('typeSummaryContent');
  if (!items.length) { el.innerHTML = '<div class="empty">新增項目後將顯示統計</div>'; return; }
  const groups = {}; // groups[attrLabel][typeLabel] = qty
  items.forEach(it => {
    const attrLabel = getItemAttrLabel(it);
    const typeLabel = it.custom ? (it.label || '自訂組合') : it.type;
    groups[attrLabel] = groups[attrLabel] || {};
    groups[attrLabel][typeLabel] = (groups[attrLabel][typeLabel] || 0) + (it.qty || 0);
  });
  el.innerHTML = renderGroupedSummary(groups);
}

function renderSummary() {
  const el = document.getElementById('summaryContent');
  if (!items.length) { el.innerHTML = '<div class="empty">新增項目後將顯示統計</div>'; return; }
  const groups = {}; // groups[groupLabel][partName] = qty
  items.forEach(it => {
    const itemSeries = it.series || getSeries();
    Object.entries(getParts({...it, series: itemSeries})).forEach(([k,v]) => {
      const isCover = isCoverPartName(k);
      const label = getPartsGroupLabel(it, itemSeries, isCover);
      groups[label] = groups[label] || {};
      groups[label][k] = (groups[label][k] || 0) + v;
    });
  });
  el.innerHTML = renderFlatSummary(groups);
}

// ── ADD ───────────────────────────────────────────────────────
function addItem() {
  const space = document.getElementById('addSpace').value.trim();
  const coverColor = document.getElementById('addCoverColor').value;
  const type = document.getElementById('addType').value;
  const partColor = document.getElementById('addPartColor').value;
  const qty = parseInt(document.getElementById('addQty').value) || 1;
  const dir = '橫'; // default; editable after
  if (!space) { showNotif('請填寫空間名稱'); return; }
  if (type === '自訂組合') return;
  items.push({ space, coverColor, type, partColor, dir, qty, series: getSeries() });
  document.getElementById('addSpace').value = '';
  document.getElementById('addQty').value = '';
  renderItems();
  showNotif('已新增項目');
}

// ── DELETE ────────────────────────────────────────────────────
function openDeleteModal(i) { deleteTargetIdx=i; document.getElementById('deleteModal').classList.add('open'); }
function closeDeleteModal() { deleteTargetIdx=null; document.getElementById('deleteModal').classList.remove('open'); }
function confirmDelete() { if(deleteTargetIdx!==null){items.splice(deleteTargetIdx,1);renderItems();showNotif('已刪除項目');} closeDeleteModal(); }

// ── EDIT ──────────────────────────────────────────────────────
function openEditModal(i) {
  editTargetIdx = i;
  const it = items[i];
  const series = it.series || getSeries();
  document.getElementById('editSeries').value = series;
  document.getElementById('editSpace').value = it.space;
  rebuildCoverColorSelect('editCoverColor', series);
  document.getElementById('editCoverColor').value = it.coverColor || '';
  rebuildTypeSelect('editType', series);
  document.getElementById('editType').value = it.type;
  rebuildPartColorSelect('editPartColor', it.type, series);
  document.getElementById('editPartColor').value = it.partColor || '';
  document.getElementById('editDir').value = it.dir || '橫';
  document.getElementById('editQty').value = it.qty;
  toggleEditOneColor(series);
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() { editTargetIdx=null; document.getElementById('editModal').classList.remove('open'); }
function confirmEdit() {
  if (editTargetIdx===null) return;
  items[editTargetIdx] = {
    ...items[editTargetIdx],
    space:      document.getElementById('editSpace').value.trim() || items[editTargetIdx].space,
    coverColor: document.getElementById('editCoverColor').value,
    type:       document.getElementById('editType').value,
    partColor:  document.getElementById('editPartColor').value,
    dir:        document.getElementById('editDir').value,
    qty:        parseInt(document.getElementById('editQty').value)||1,
    series:     document.getElementById('editSeries').value,
  };
  renderItems(); showNotif('已更新項目'); closeEditModal();
}

// ── CUSTOM MODAL ──────────────────────────────────────────────
let customEditIdx = null;

function openCustomModal(editIdx = null) {
  customEditIdx = editIdx;
  const isEdit = editIdx !== null;
  document.getElementById('customModalTitle').textContent = isEdit ? '編輯自訂組合' : '自訂組合';
  document.getElementById('customModal').querySelector('.btn.primary').textContent = isEdit ? '儲存' : '儲存';

  const list = document.getElementById('customPartsList');
  list.innerHTML = '';

  if (isEdit) {
    const it = items[editIdx];
    document.getElementById('customSeries').value = it.series || getSeries();
    document.getElementById('customSpace').value = it.space || '';
    document.getElementById('customLabel').value = it.label || '';
    document.getElementById('customCoverColor').value = it.coverColor || '';
    document.getElementById('customPartColor').value = it.partColor || '';
    Object.entries(it.customParts || {}).forEach(([name, qty]) => addCustomPartRow(name, qty));
  } else {
    document.getElementById('customSeries').value = getSeries();
    document.getElementById('customSpace').value = document.getElementById('addSpace').value || '';
    document.getElementById('customLabel').value = '';
    document.getElementById('customCoverColor').value = '';
    document.getElementById('customPartColor').value = '';
    addCustomPartRow();
  }
  document.getElementById('customModal').classList.add('open');
}

function closeCustomModal() {
  customEditIdx = null;
  document.getElementById('customModal').classList.remove('open');
}

function addCustomPartRow(name = '', qty = '') {
  const list = document.getElementById('customPartsList');
  const row = document.createElement('div');
  row.className = 'custom-part-row';
  row.innerHTML = `
    <input type="text" placeholder="零件名稱或料號" style="font-size:13px" value="${name}">
    <input type="text" placeholder="數量" style="font-size:13px;text-align:center" value="${qty}">
    <button class="btn sm danger" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}

function confirmCustom() {
  const space = document.getElementById('customSpace').value.trim();
  const label = document.getElementById('customLabel').value.trim() || '自訂組合';
  const coverColor = document.getElementById('customCoverColor').value.trim();
  const partColor  = document.getElementById('customPartColor').value.trim();
  if (!space) { showNotif('請填寫空間名稱'); return; }
  const customParts = {};
  document.querySelectorAll('.custom-part-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim();
    const qty  = parseInt(inputs[1].value) || 1;
    if (name) customParts[name] = (customParts[name] || 0) + qty;
  });
  if (!Object.keys(customParts).length) { showNotif('請至少填入一個零件'); return; }

  const series = document.getElementById('customSeries').value;
  const entry = { space, label, custom: true, customParts, qty: 1, series, coverColor, partColor };
  if (customEditIdx !== null) {
    items[customEditIdx] = entry;
    showNotif('已更新自訂組合');
  } else {
    items.push(entry);
    showNotif('已新增自訂組合');
  }
  renderItems();
  closeCustomModal();
}

// ── JSON ──────────────────────────────────────────────────────
function exportJSON() {
  if (!document.getElementById('projectName').value.trim()) { document.getElementById('projectName').classList.add('input-error'); showNotif('請先填寫建案名稱／戶號'); return; }
  const data = { projectName:document.getElementById('projectName').value, panelSeries:getSeries(), items, exportedAt:new Date().toISOString() };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = (data.projectName||'面板訂購')+'_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.json';
  a.click(); showNotif('已匯出 JSON');
}
function importData() { document.getElementById('fileInput').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      document.getElementById('projectName').value = data.projectName||'';
      document.getElementById('panelSeries').value = data.panelSeries||'Glatima';
      onSeriesChange();
      items = data.items||[];
      renderItems(); showNotif('已匯入資料');
    } catch { showNotif('檔案格式錯誤'); }
  };
  reader.readAsText(file); e.target.value='';
}

// ── JPG ───────────────────────────────────────────────────────
function exportJPG() {

  const addSection = document.querySelector('#addSpace').closest('section');
  addSection.style.display = 'none';
  showNotif('產生中…');
  html2canvas(document.querySelector('main'), {
    backgroundColor: '#f5f3ef',
    scale: 2,
    useCORS: true,
    logging: false,
  }).then(canvas => {
    addSection.style.display = '';
    const link = document.createElement('a');
    const projectName = document.getElementById('projectName').value || '面板訂購';
    link.download = projectName + '_' + new Date().toLocaleDateString('zh-TW').replace(/\//g,'-') + '.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
    showNotif('已匯出 JPG');
  }).catch(() => {
    addSection.style.display = '';
    showNotif('匯出失敗，請重試');
  });
}

// ── NOTIF ─────────────────────────────────────────────────────
function showNotif(msg) {
  const el=document.getElementById('notif'); el.textContent=msg;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────
(function init() {
  rebuildTypeSelect('addType');
  rebuildTypeSelect('editType');
  rebuildCoverColorSelect('addCoverColor');
  rebuildCoverColorSelect('editCoverColor');
  rebuildPartColorSelect('addPartColor', '單連1切開關');
  rebuildPartColorSelect('editPartColor', '單連1切開關');
  document.getElementById('addQty').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });
  // 初始化 table class
  const initOneColor = isOneColorSeries(getSeries());
  document.getElementById('mainTable')?.classList.toggle('one-color', initOneColor);
})();
</script>
